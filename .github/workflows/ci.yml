name: ci

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build-test-package:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test integration seams
        run: dotnet test tests/KspIntegrationTests/KspIntegrationTests.csproj --configuration Release --no-build

      - name: Package mod artifacts
        run: bash scripts/package-release.sh 0.1.0

      - name: Upload zip artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ksp-mod-zips
          path: artifacts/release/0.1.0/*.zip
